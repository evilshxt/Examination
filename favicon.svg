<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" fill="#1a1a1a" rx="4"/>
  
  <!-- Scale ruler icon -->
  <g transform="translate(6, 10)">
    <!-- Main ruler body -->
    <rect x="0" y="0" width="20" height="12" fill="#f5f5f5" stroke="#333" stroke-width="0.5"/>
    
    <!-- Measurement marks -->
    <!-- Major marks (every 5 units) -->
    <rect x="0" y="0" width="1" height="8" fill="#333"/>
    <rect x="5" y="0" width="1" height="6" fill="#333"/>
    <rect x="10" y="0" width="1" height="8" fill="#333"/>
    <rect x="15" y="0" width="1" height="6" fill="#333"/>
    <rect x="20" y="0" width="1" height="8" fill="#333"/>
    
    <!-- Minor marks -->
    <rect x="2.5" y="0" width="0.5" height="4" fill="#666"/>
    <rect x="7.5" y="0" width="0.5" height="4" fill="#666"/>
    <rect x="12.5" y="0" width="0.5" height="4" fill="#666"/>
    <rect x="17.5" y="0" width="0.5" height="4" fill="#666"/>
    
    <!-- Numbers -->
    <text x="0" y="11" font-family="Arial, sans-serif" font-size="3" fill="#333" text-anchor="middle">0</text>
    <text x="5" y="11" font-family="Arial, sans-serif" font-size="3" fill="#333" text-anchor="middle">5</text>
    <text x="10" y="11" font-family="Arial, sans-serif" font-size="3" fill="#333" text-anchor="middle">10</text>
    <text x="15" y="11" font-family="Arial, sans-serif" font-size="3" fill="#333" text-anchor="middle">15</text>
    <text x="20" y="11" font-family="Arial, sans-serif" font-size="3" fill="#333" text-anchor="middle">20</text>
  </g>
  
  <!-- Small 3D cube to represent graphics -->
  <g transform="translate(18, 16) scale(0.8)">
    <!-- Cube faces -->
    <path d="M 0,0 L 4,-2 L 4,2 L 0,4 Z" fill="#ff6b6b" opacity="0.9"/>
    <path d="M -2,1 L 0,0 L 0,4 L -2,5 Z" fill="#4ecdc4" opacity="0.9"/>
    <path d="M -2,1 L 0,0 L 4,-2 L 2,-1 Z" fill="#ffe66d" opacity="0.9"/>
  </g>
  
  <!-- Project code -->
  <text x="16" y="30" font-family="monospace" font-size="4" fill="#888" text-anchor="middle" font-weight="bold">FCM</text>
</svg>
